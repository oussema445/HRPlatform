<div class="page-container">
  <nav class="navbar">
    <div class="navbar-brand">🏢 HR Platform</div>
    <div class="navbar-menu">
      @if (role !== 'Employee') {
        <a routerLink="/dashboard">Dashboard</a>
        <a routerLink="/employees">Employés</a>
      }
      <a routerLink="/leaves">Congés</a>
      @if (role !== 'Employee') {
        <a routerLink="/payroll">Paie</a>
        <a routerLink="/notifications">🔔</a>
      }
      <a routerLink="/profile" class="active">👤 Profil</a>
    </div>
    <button (click)="logout()" class="logout-btn">Déconnexion</button>
  </nav>

  <div class="content">
    <div class="profile-container">

      <!-- Info Card -->
      <div class="profile-card">
        <div class="avatar">{{ fullName[0] }}</div>
        <h2>{{ fullName }}</h2>
        <span class="role-badge">{{ role }}</span>
      </div>

      <!-- Change Password Card -->
      <div class="password-card">
        <h3>🔐 Changer le mot de passe</h3>

        @if (message) {
          <div class="success-message">✅ {{ message }}</div>
        }

        @if (error) {
          <div class="error-message">❌ {{ error }}</div>
        }

        <div class="form-group">
          <label>Ancien mot de passe</label>
          <input
            [(ngModel)]="oldPassword"
            type="password"
            class="form-control"
            placeholder="••••••••"
          />
        </div>

        <div class="form-group">
          <label>Nouveau mot de passe</label>
          <input
            [(ngModel)]="newPassword"
            type="password"
            class="form-control"
            placeholder="••••••••"
          />
        </div>

        <div class="form-group">
          <label>Confirmer le mot de passe</label>
          <input
            [(ngModel)]="confirmPassword"
            type="password"
            class="form-control"
            placeholder="••••••••"
          />
        </div>

        <button (click)="changePassword()" class="btn-primary">
          Modifier le mot de passe
        </button>
      </div>

    </div>
  </div>
</div>
